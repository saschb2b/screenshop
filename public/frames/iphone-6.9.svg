<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -10 920 1860" fill="none">
  <defs>
    <filter id="shadow" x="-5%" y="-3%" width="110%" height="106%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="bezelHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Mask: white = visible, black = transparent hole -->
    <mask id="screenMask">
      <rect x="-20" y="-20" width="940" height="1880" fill="white"/>
      <rect x="25" y="24" width="850" height="1792" rx="52" ry="52" fill="black"/>
    </mask>
  </defs>
  <!-- Outer body with shadow and screen hole -->
  <g mask="url(#screenMask)">
    <rect x="4" y="4" width="892" height="1832" rx="68" ry="68" fill="url(#bodyGrad)" filter="url(#shadow)"/>
    <rect x="4" y="4" width="892" height="1832" rx="68" ry="68" fill="url(#bezelHighlight)"/>
  </g>
  <!-- Outer bezel stroke -->
  <rect x="4" y="4" width="892" height="1832" rx="68" ry="68" stroke="#3a3a3a" stroke-width="3" fill="none"/>
  <!-- Inner screen border -->
  <rect x="25" y="24" width="850" height="1792" rx="52" ry="52" stroke="#222" stroke-width="1.5" fill="none"/>
  <!-- Dynamic Island -->
  <rect x="335" y="34" width="230" height="38" rx="19" fill="#111111"/>
  <rect x="335" y="34" width="230" height="38" rx="19" stroke="#222" stroke-width="1" fill="none"/>
  <!-- Left side buttons -->
  <rect x="-2" y="320" width="6" height="80" rx="3" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
  <rect x="-2" y="440" width="6" height="56" rx="3" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
  <rect x="-2" y="510" width="6" height="56" rx="3" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
  <!-- Right side button -->
  <rect x="896" y="420" width="6" height="100" rx="3" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
</svg>
