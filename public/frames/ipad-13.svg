<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -10 1620 2120" fill="none">
  <defs>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="bezelHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <mask id="screenMask">
      <rect x="-20" y="-20" width="1640" height="2140" fill="white"/>
      <rect x="40" y="40" width="1520" height="2020" rx="12" ry="12" fill="black"/>
    </mask>
  </defs>
  <!-- Outer body with screen hole -->
  <g mask="url(#screenMask)">
    <rect x="4" y="4" width="1592" height="2092" rx="36" ry="36" fill="url(#bodyGrad)" filter="url(#shadow)"/>
    <rect x="4" y="4" width="1592" height="2092" rx="36" ry="36" fill="url(#bezelHighlight)"/>
  </g>
  <rect x="4" y="4" width="1592" height="2092" rx="36" ry="36" stroke="#3a3a3a" stroke-width="2.5" fill="none"/>
  <rect x="40" y="40" width="1520" height="2020" rx="12" ry="12" stroke="#222" stroke-width="1.5" fill="none"/>
  <!-- Camera -->
  <circle cx="800" cy="22" r="6" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
</svg>
