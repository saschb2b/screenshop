<svg xmlns="http://www.w3.org/2000/svg" viewBox="-10 -10 760 1540" fill="none">
  <defs>
    <filter id="shadow" x="-5%" y="-3%" width="110%" height="106%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="bezelHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Outer body -->
  <rect x="4" y="4" width="732" height="1512" rx="44" ry="44" fill="url(#bodyGrad)" filter="url(#shadow)"/>
  <rect x="4" y="4" width="732" height="1512" rx="44" ry="44" fill="url(#bezelHighlight)"/>
  <rect x="4" y="4" width="732" height="1512" rx="44" ry="44" stroke="#3a3a3a" stroke-width="2.5" fill="none"/>
  <rect x="20" y="20" width="700" height="1480" rx="30" ry="30" stroke="#222" stroke-width="1.5" fill="none"/>
  <!-- Screen cutout -->
  <rect x="22" y="22" width="696" height="1476" rx="28" ry="28" fill="transparent"/>
  <!-- Camera punch hole -->
  <circle cx="370" cy="40" r="10" fill="#111111" stroke="#222" stroke-width="1"/>
  <!-- Right side buttons -->
  <rect x="736" y="360" width="6" height="80" rx="3" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
  <rect x="736" y="480" width="6" height="56" rx="3" fill="#2a2a2a" stroke="#3a3a3a" stroke-width="0.5"/>
</svg>
